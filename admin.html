<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA 測驗管理後台｜黃微</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cp: #7d0000; --cp-light: #f5e6e6;
  --np: #c9637e; --np-light: #fdf0f4;
  --a:  #5585bc; --a-light:  #eef4fb;
  --fc: #c9a000; --fc-light: #fffbe6;
  --ac: #a07850; --ac-light: #f7f1ec;
  --bg: #F4F3EF; --surface: #FFFFFF; --border: #E0DED6;
  --text: #1A1A18; --muted: #6B6A65; --hint: #A8A7A2;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family:'PingFang TC','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── 登入畫面 ── */
#loginScreen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:2rem;
}
.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:2.5rem 2rem; width:100%; max-width:360px;
  text-align:center;
}
.login-logo { font-size:1.5rem; font-weight:800; color:var(--cp); margin-bottom:.3rem; }
.login-sub { font-size:.82rem; color:var(--muted); margin-bottom:2rem; }
.login-input {
  width:100%; padding:11px 14px; border:1.5px solid var(--border);
  border-radius:999px; font-size:.9rem; font-family:inherit;
  outline:none; transition:border-color .15s; margin-bottom:.75rem;
}
.login-input:focus { border-color:var(--cp); }
.login-btn {
  width:100%; padding:12px; background:var(--cp); color:#fff;
  border:none; border-radius:999px; font-size:.9rem; font-weight:700;
  cursor:pointer; font-family:inherit;
}
.login-err { font-size:.8rem; color:var(--cp); margin-top:.5rem; display:none; }

/* ── 主介面 ── */
#mainScreen { display:none; }
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:.85rem 1.5rem; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-brand { font-size:.95rem; font-weight:800; color:var(--cp); }
.topbar-right { display:flex; align-items:center; gap:1rem; }
.topbar-hint { font-size:.78rem; color:var(--hint); }
.logout-btn {
  padding:6px 14px; border:1.5px solid var(--border); border-radius:999px;
  background:transparent; font-size:.78rem; color:var(--muted); cursor:pointer;
  font-family:inherit;
}
.wrap { max-width:900px; margin:0 auto; padding:1.75rem 1.25rem 4rem; }

/* ── Tab 導覽 ── */
.tabs { display:flex; gap:6px; margin-bottom:1.75rem; border-bottom:1px solid var(--border); padding-bottom:0; }
.tab {
  padding:9px 18px; border:none; background:transparent;
  font-size:.88rem; font-weight:600; color:var(--muted); cursor:pointer;
  font-family:inherit; border-bottom:2.5px solid transparent; margin-bottom:-1px;
  transition:color .12s, border-color .12s;
}
.tab.active { color:var(--cp); border-bottom-color:var(--cp); }

/* ── 卡片 ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.5rem; margin-bottom:1rem;
}
.card-title { font-size:.95rem; font-weight:800; margin-bottom:1.25rem; }
.card-sub { font-size:.8rem; color:var(--muted); margin-top:.25rem; font-weight:400; }

/* ── 表單元素 ── */
.form-row { display:grid; gap:.75rem; margin-bottom:1rem; }
.form-row.cols2 { grid-template-columns:1fr 1fr; }
.form-row.cols3 { grid-template-columns:1fr 1fr 80px; }
.form-row.cols4 { grid-template-columns:1fr 80px 140px 80px; }
label { font-size:.78rem; font-weight:700; color:var(--muted); display:block; margin-bottom:.3rem; }
input[type=text], input[type=number], input[type=email] {
  width:100%; padding:9px 13px; border:1.5px solid var(--border);
  border-radius:var(--radius-sm); font-size:.88rem; font-family:inherit;
  color:var(--text); background:var(--bg); outline:none; transition:border-color .15s;
}
input:focus { border-color:var(--cp); }
.btn-primary {
  padding:10px 22px; background:var(--cp); color:#fff; border:none;
  border-radius:999px; font-size:.88rem; font-weight:700; cursor:pointer;
  font-family:inherit; transition:background .12s;
}
.btn-primary:hover { background:#5a0000; }
.btn-primary:disabled { background:#ccc; cursor:not-allowed; }
.btn-sec {
  padding:8px 16px; background:transparent; color:var(--text);
  border:1.5px solid var(--border); border-radius:999px; font-size:.82rem;
  font-weight:600; cursor:pointer; font-family:inherit;
}
.btn-sec:hover { border-color:#999; }
.btn-danger {
  padding:8px 16px; background:transparent; color:var(--cp);
  border:1.5px solid var(--cp-light); border-radius:999px; font-size:.82rem;
  font-weight:600; cursor:pointer; font-family:inherit;
}

/* ── 訊息提示 ── */
.msg { font-size:.82rem; padding:.6rem .85rem; border-radius:var(--radius-sm); margin-top:.75rem; display:none; }
.msg.ok { background:#e8f5e9; color:#2e7d32; }
.msg.err { background:var(--cp-light); color:var(--cp); }
.msg.info { background:var(--a-light); color:#2d5a8e; }

/* ── 邀請碼結果 ── */
.codes-result {
  background:var(--bg); border-radius:var(--radius-sm);
  padding:1rem; margin-top:1rem; display:none;
}
.codes-result-title { font-size:.78rem; font-weight:700; color:var(--muted); margin-bottom:.5rem; }
.codes-grid { display:flex; flex-wrap:wrap; gap:7px; }
.code-chip {
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:5px 10px; font-size:.85rem; font-weight:700;
  font-family:monospace; color:var(--text); letter-spacing:.05em;
  cursor:pointer; transition:border-color .12s;
  position:relative;
}
.code-chip:hover { border-color:var(--cp); }
.code-chip.copied { border-color:#4caf50; color:#2e7d32; }
.copy-all-btn { margin-top:.75rem; }

/* ── 企業列表 ── */
.org-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.org-table th {
  text-align:left; font-size:.72rem; font-weight:700; letter-spacing:.05em;
  color:var(--hint); padding:.5rem .75rem; border-bottom:1px solid var(--border);
}
.org-table td { padding:.7rem .75rem; border-bottom:1px solid var(--border); vertical-align:middle; }
.org-table tr:last-child td { border-bottom:none; }
.org-table tr:hover td { background:var(--bg); }
.status-badge {
  display:inline-block; padding:3px 9px; border-radius:999px;
  font-size:.72rem; font-weight:700;
}
.status-full { background:#e8f5e9; color:#2e7d32; }
.status-partial { background:var(--fc-light); color:var(--fc); }
.status-empty { background:var(--bg); color:var(--hint); }
.progress-bar-wrap { width:80px; height:6px; background:var(--border); border-radius:999px; overflow:hidden; }
.progress-bar-fill { height:100%; background:var(--cp); border-radius:999px; transition:width .3s; }

/* ── 報告列表 ── */
.report-row {
  display:flex; align-items:center; gap:1rem; padding:.85rem 0;
  border-bottom:1px solid var(--border);
}
.report-row:last-child { border-bottom:none; }
.report-info { flex:1; }
.report-name { font-size:.9rem; font-weight:700; }
.report-meta { font-size:.75rem; color:var(--muted); margin-top:2px; }
.report-actions { display:flex; gap:8px; }

/* ── 空狀態 ── */
.empty { text-align:center; padding:2.5rem 1rem; color:var(--hint); font-size:.88rem; }

/* ── Loading ── */
.loading { text-align:center; padding:2rem; color:var(--hint); font-size:.85rem; }

@media(max-width:600px) {
  .form-row.cols2, .form-row.cols3, .form-row.cols4 { grid-template-columns:1fr; }
  .org-table th:nth-child(4), .org-table td:nth-child(4) { display:none; }
}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">內在聲音研究室</div>
    <div class="login-sub">企業版管理後台</div>
    <input class="login-input" type="password" id="pwInput" placeholder="請輸入管理密碼"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">進入後台</button>
    <div class="login-err" id="loginErr">密碼錯誤，請再試一次。</div>
  </div>
</div>

<!-- 主介面 -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-brand">TA 測驗管理後台</div>
    <div class="topbar-right">
      <span class="topbar-hint" id="topbarHint"></span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="wrap">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('codes')">產生邀請碼</button>
      <button class="tab" onclick="switchTab('orgs')">企業列表</button>
      <button class="tab" onclick="switchTab('reports')">報告記錄</button>
    </div>

    <!-- ── Tab 1：產生邀請碼 ── -->
    <div id="tabCodes">
      <div class="card">
        <div class="card-title">建立新一批邀請碼
          <span class="card-sub">每個邀請碼只能使用一次，員工輸入後才能進入企業版測驗。</span>
        </div>
        <div class="form-row cols2">
          <div>
            <label>企業名稱</label>
            <input type="text" id="orgName" placeholder="例：哈佛企管顧問公司">
          </div>
          <div>
            <label>企業代碼（英數，建議用縮寫）</label>
            <input type="text" id="orgCodeInput" placeholder="例：HARVARD2025" style="text-transform:uppercase">
          </div>
        </div>
        <div class="form-row" style="grid-template-columns:120px 160px 1fr">
          <div>
            <label>產生幾個碼</label>
            <input type="number" id="codeCount" value="10" min="1" max="200">
          </div>
          <div>
            <label>邀請碼類型</label>
            <select id="codeType">
              <option value="leadership">主管領導力版</option>
              <option value="interview">面試者版</option>
            </select>
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button class="btn-primary" onclick="createCodes()">產生邀請碼</button>
          </div>
        </div>
        <div class="msg" id="codeMsg"></div>

        <div class="codes-result" id="codesResult">
          <div class="codes-result-title" id="codesResultTitle"></div>
          <div class="codes-grid" id="codesGrid"></div>
          <button class="btn-sec copy-all-btn" onclick="copyAllCodes()">複製全部邀請碼</button>
          <div style="margin-top:.5rem;font-size:.75rem;color:var(--hint)">
            點每個碼可以單獨複製。「複製全部」會把所有碼複製到剪貼簿（每行一個）。
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">補發邀請碼（為現有企業增加人數）</div>
        <div class="form-row cols4">
          <div>
            <label>企業代碼</label>
            <input type="text" id="addOrgCode" placeholder="輸入現有企業代碼" style="text-transform:uppercase">
          </div>
          <div>
            <label>補發幾個</label>
            <input type="number" id="addCount" value="5" min="1" max="100">
          </div>
          <div>
            <label>邀請碼類型</label>
            <select id="addCodeType">
              <option value="leadership">主管領導力版</option>
              <option value="interview">面試者版</option>
            </select>
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button class="btn-primary" onclick="addCodes()">補發</button>
          </div>
        </div>
        <div class="msg" id="addMsg"></div>
        <div class="codes-result" id="addCodesResult">
          <div class="codes-result-title" id="addCodesResultTitle"></div>
          <div class="codes-grid" id="addCodesGrid"></div>
          <button class="btn-sec copy-all-btn" onclick="copyAllAddCodes()">複製全部</button>
        </div>
      </div>
    </div>

    <!-- ── Tab 2：企業列表 ── -->
    <div id="tabOrgs" style="display:none;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
          <div class="card-title" style="margin-bottom:0">所有企業</div>
          <button class="btn-sec" onclick="loadOrgs()">重新整理</button>
        </div>
        <div id="orgsContent"><div class="loading">載入中…</div></div>
      </div>
    </div>

    <!-- ── Tab 3：報告記錄 ── -->
    <div id="tabReports" style="display:none;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
          <div class="card-title" style="margin-bottom:0">所有報告</div>
          <button class="btn-sec" onclick="loadReports()">重新整理</button>
        </div>
        <div id="reportsContent"><div class="loading">載入中…</div></div>
      </div>
    </div>

  </div>
</div>

<!-- 企業詳情 Modal -->
<div id="orgModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:var(--surface);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <div style="font-size:1rem;font-weight:800;" id="modalTitle">企業詳情</div>
      <button class="btn-sec" onclick="closeModal()">關閉</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- 產生報告 Modal -->
<div id="reportModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:var(--surface);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <div>
        <div style="font-size:1rem;font-weight:800;">產生彙整報告</div>
        <div style="font-size:.82rem;color:var(--muted);margin-top:2px;" id="reportModalOrgName"></div>
      </div>
      <button class="btn-sec" onclick="document.getElementById('reportModal').style.display='none'">關閉</button>
    </div>
    <input type="hidden" id="reportModalOrgCode">
    <input type="hidden" id="reportModalTeamTop">
    <input type="hidden" id="reportModalTeamLow">

    <div style="margin-bottom:1.25rem;">
      <label style="font-size:.78rem;font-weight:700;color:var(--muted);display:block;margin-bottom:.4rem;">這個企業最想解決的議題（選填）</label>
      <select id="issueSelect" onchange="onIssueSelect()"
        style="width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none;cursor:pointer;">
        <option value="">— 選擇議題，或直接手動輸入 —</option>
      </select>
    </div>

    <div style="margin-bottom:1rem;">
      <label style="font-size:.78rem;font-weight:700;color:var(--muted);display:block;margin-bottom:.4rem;">
        針對性建議（會顯示在報告的「針對你們現在最想解決的事」區塊）
      </label>
      <textarea id="issueNote"
        style="width:100%;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;min-height:200px;outline:none;line-height:1.75;transition:border-color .15s;"
        onfocus="this.style.borderColor='var(--cp)'" onblur="this.style.borderColor='var(--border)'"
        placeholder="選擇議題後會自動帶入草稿文案，你可以直接修改。也可以不選議題，直接在這裡輸入。若留空，報告裡不會顯示這個區塊。"></textarea>
      <div style="font-size:.72rem;color:var(--hint);margin-top:.35rem;">選完議題後草稿會自動帶入，可以直接在框裡修改。留空代表報告裡不顯示此區塊。</div>
    </div>

    <div class="msg" id="reportModalMsg"></div>

    <div style="display:flex;gap:.75rem;margin-top:1.25rem;justify-content:flex-end;">
      <button class="btn-sec" onclick="document.getElementById('reportModal').style.display='none'">取消</button>
      <button class="btn-primary" id="reportModalBtn" onclick="confirmGenerateReport()">產生報告並寄通知</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
//  設定
// ════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzU8y0Sz7xablFZBaH8mQh8llwNmnpXGHvpERjt_msY0OrK3riSkZz8PR7oyjBruco-cw/exec';
const ADMIN_PASSWORD = 'YOUR_PASSWORD_HERE'; // ← 改成你的密碼（與 Code.gs 一致）
const STATE_COLORS = { CP:'#7d0000', NP:'#c9637e', A:'#5585bc', FC:'#c9a000', AC:'#a07850' };
const STATE_NAMES = { CP:'控制型父母', NP:'撫育型父母', A:'成人自我', FC:'自由型兒童', AC:'順應型兒童' };

let adminToken = '';
let lastCodes = [];
let lastAddCodes = [];

// ════════════════════════════════
//  登入 / 登出
// ════════════════════════════════
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    adminToken = pw;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('topbarHint').textContent = new Date().toLocaleDateString('zh-TW');
    loadOrgs();
    loadReports();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function doLogout() {
  adminToken = '';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// ════════════════════════════════
//  Tab 切換
// ════════════════════════════════
function switchTab(name) {
  ['codes','orgs','reports'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['codes','orgs','reports'][i] === name);
  });
}

// ════════════════════════════════
//  API 呼叫
// ════════════════════════════════
async function callAPI(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...payload, token: adminToken })
  });
  return await res.json();
}

// ════════════════════════════════
//  產生邀請碼
// ════════════════════════════════
async function createCodes() {
  const orgName = document.getElementById('orgName').value.trim();
  const orgCode = document.getElementById('orgCodeInput').value.trim().toUpperCase();
  const count = parseInt(document.getElementById('codeCount').value) || 10;
  const codeType = document.getElementById('codeType').value;
  const msg = document.getElementById('codeMsg');

  if (!orgName || !orgCode) {
    showMsg(msg, 'err', '請填寫企業名稱和企業代碼。');
    return;
  }

  showMsg(msg, 'info', '產生中，請稍候…');
  document.querySelector('#tabCodes .btn-primary').disabled = true;

  try {
    const data = await callAPI({ type: 'adminCreateCodes', orgCode, orgName, count, codeType });
    document.querySelector('#tabCodes .btn-primary').disabled = false;

    if (data.status === 'ok') {
      showMsg(msg, 'ok', `成功產生 ${data.count} 個邀請碼，企業代碼：${data.orgCode}`);
      lastCodes = data.codes;
      renderCodes(data.codes, 'codesGrid', 'codesResultTitle', `${orgName}（${data.orgCode}）的邀請碼`);
      document.getElementById('codesResult').style.display = 'block';
      loadOrgs();
    } else {
      showMsg(msg, 'err', data.message || '發生錯誤');
    }
  } catch(e) {
    document.querySelector('#tabCodes .btn-primary').disabled = false;
    showMsg(msg, 'err', '網路錯誤，請再試一次。');
  }
}

async function addCodes() {
  const orgCode = document.getElementById('addOrgCode').value.trim().toUpperCase();
  const count = parseInt(document.getElementById('addCount').value) || 5;
  const codeType = document.getElementById('addCodeType').value;
  const msg = document.getElementById('addMsg');

  if (!orgCode) {
    showMsg(msg, 'err', '請填寫企業代碼。');
    return;
  }

  showMsg(msg, 'info', '補發中…');

  try {
    // 補發時企業名稱留空，後端會沿用現有名稱
    const data = await callAPI({ type: 'adminCreateCodes', orgCode, orgName: orgCode, count, codeType });
    if (data.status === 'ok') {
      showMsg(msg, 'ok', `成功補發 ${data.count} 個邀請碼`);
      lastAddCodes = data.codes;
      renderCodes(data.codes, 'addCodesGrid', 'addCodesResultTitle', `${orgCode} 補發的邀請碼`);
      document.getElementById('addCodesResult').style.display = 'block';
      loadOrgs();
    } else {
      showMsg(msg, 'err', data.message || '發生錯誤');
    }
  } catch(e) {
    showMsg(msg, 'err', '網路錯誤，請再試一次。');
  }
}

function renderCodes(codes, gridId, titleId, title) {
  document.getElementById(titleId).textContent = title;
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  codes.forEach(code => {
    const chip = document.createElement('div');
    chip.className = 'code-chip';
    chip.textContent = code;
    chip.title = '點擊複製';
    chip.onclick = () => {
      navigator.clipboard.writeText(code).then(() => {
        chip.classList.add('copied');
        chip.textContent = '已複製 ✓';
        setTimeout(() => { chip.classList.remove('copied'); chip.textContent = code; }, 1500);
      });
    };
    grid.appendChild(chip);
  });
}

function copyAllCodes() {
  navigator.clipboard.writeText(lastCodes.join('\n')).then(() => {
    document.querySelector('#codesResult .copy-all-btn').textContent = '已複製！';
    setTimeout(() => document.querySelector('#codesResult .copy-all-btn').textContent = '複製全部邀請碼', 2000);
  });
}

function copyAllAddCodes() {
  navigator.clipboard.writeText(lastAddCodes.join('\n')).then(() => {
    document.querySelector('#addCodesResult .copy-all-btn').textContent = '已複製！';
    setTimeout(() => document.querySelector('#addCodesResult .copy-all-btn').textContent = '複製全部', 2000);
  });
}

async function loadOrgs() {
  const el = document.getElementById('orgsContent');
  el.innerHTML = '<div class="loading">載入中…</div>';
  try {
    const data = await callAPI({ type: 'adminGetOrgs' });
    if (data.status !== 'ok' || data.orgs.length === 0) {
      el.innerHTML = '<div class="empty">還沒有企業資料。</div>';
      return;
    }
    const rows = data.orgs.map(org => {
      const pct = org.totalInvited > 0 ? Math.round(org.completed / org.totalInvited * 100) : 0;
      const statusClass = pct === 100 ? 'status-full' : pct > 0 ? 'status-partial' : 'status-empty';
      const statusText = pct === 100 ? '全部完成' : pct > 0 ? `${pct}% 完成` : '尚未開始';
      return `<tr>
        <td><strong>${org.orgName}</strong><br><span style="font-size:.72rem;color:var(--hint)">${org.orgCode}</span></td>
        <td>${org.completed} / ${org.totalInvited} 人</td>
        <td>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td>
          <button class="btn-sec" style="font-size:.75rem;padding:5px 10px" onclick="showOrgDetail('${org.orgCode}','${org.orgName}')">詳情 / 產生報告</button>
        </td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table class="org-table">
      <thead><tr>
        <th>企業</th><th>完成進度</th><th style="width:100px">進度條</th><th>狀態</th><th>操作</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch(e) {
    el.innerHTML = '<div class="empty">載入失敗，請重新整理。</div>';
  }
}

async function showOrgDetail(orgCode, orgName) {
  document.getElementById('modalTitle').textContent = orgName;
  document.getElementById('modalContent').innerHTML = '<div class="loading">載入中…</div>';
  document.getElementById('orgModal').style.display = 'flex';

  try {
    const data = await callAPI({ type: 'adminGetOrgStatus', orgCode });
    if (data.status !== 'ok' || data.completed === 0) {
      document.getElementById('modalContent').innerHTML = '<div class="empty">目前尚無完成記錄。</div>';
      return;
    }

    // 計算統計
    const n = data.records.length;
    const avg = { CP:0, NP:0, A:0, FC:0, AC:0 };
    const topCount = { CP:0, NP:0, A:0, FC:0, AC:0 };
    data.records.forEach(r => {
      ['CP','NP','A','FC','AC'].forEach(k => avg[k] += (parseInt(r.scores[k])||0));
      if (r.topState && avg[r.topState] !== undefined) topCount[r.topState] = (topCount[r.topState]||0)+1;
    });
    ['CP','NP','A','FC','AC'].forEach(k => avg[k] = Math.round(avg[k]/n*10)/10);

    const sorted = ['CP','NP','A','FC','AC'].map(k => ({ k, v: avg[k] })).sort((a,b) => b.v-a.v);

    const bars = sorted.map(({ k, v }) => `
      <div style="margin-bottom:.6rem">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px">
          <span style="font-weight:700;color:${STATE_COLORS[k]}">${k} ${STATE_NAMES[k]}</span>
          <span style="color:var(--muted)">${v} 分</span>
        </div>
        <div style="background:var(--border);border-radius:999px;height:8px;overflow:hidden">
          <div style="height:100%;background:${STATE_COLORS[k]};width:${v/20*100}%;border-radius:999px"></div>
        </div>
      </div>`).join('');

    // 計算 teamTop 和 teamLow
    const sortedForModal = ['CP','NP','A','FC','AC']
      .map(k => ({ k, v: avg[k] }))
      .sort((a,b) => b.v - a.v);
    const modalTeamTop = sortedForModal[0].k;
    const modalTeamLow = sortedForModal[sortedForModal.length-1].k;

    document.getElementById('modalContent').innerHTML = `
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:1.25rem">共 ${n} 人完成測驗・團隊最強聲音：<strong style="color:${STATE_COLORS[modalTeamTop]}">${modalTeamTop}</strong>・最安靜：<strong style="color:${STATE_COLORS[modalTeamLow]}">${modalTeamLow}</strong></div>
      <div style="font-size:.82rem;font-weight:700;color:var(--hint);margin-bottom:.75rem">五種聲音平均分數</div>
      ${bars}
      <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)">
        <div style="font-size:.82rem;font-weight:700;color:var(--hint);margin-bottom:.5rem">最常出現的聲音分布</div>
        ${['CP','NP','A','FC','AC'].map(k => {
          const pct = n > 0 ? Math.round((topCount[k]||0)/n*100) : 0;
          return `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;font-size:.82rem">
            <span style="color:${STATE_COLORS[k]};font-weight:700;width:28px">${k}</span>
            <span style="color:var(--muted)">${topCount[k]||0} 人（${pct}%）</span>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:1rem">
        <button class="btn-primary" onclick="generateReport('${orgCode}','${orgName}','${modalTeamTop}','${modalTeamLow}');closeModal()">產生彙整報告</button>
      </div>`;
  } catch(e) {
    document.getElementById('modalContent').innerHTML = '<div class="empty">載入失敗。</div>';
  }
}

function closeModal() {
  document.getElementById('orgModal').style.display = 'none';
}

const ISSUE_LABELS = [

// ── 動態文案庫：COMBO_DRAFTS[議題index][最高_最低] ──
const COMBO_DRAFTS = [

// ════ 議題 0：中間主管不願說真話 ════
{
'CP_NP':`團隊整體CP偏高、NP相對偏低，主管層普遍以標準與效率為優先，對於「先讓人感覺安全再說話」這件事，投入的能量相對少。這正是中間主管習慣順應、不願說真話的核心原因——不是因為沒有想法，而是說出不同意見的代價，在這個文化裡感覺太高。

CP的優勢在於讓組織有明確的方向與紀律，但當CP主導的氛圍過強，下屬最常學會的，往往是「先猜主管要什麼」，而不是「說清楚我自己的判斷」。這種順應文化一旦成型，組織就開始失去真正有價值的內部訊號。

建議從制度面切入，而非只倚賴個人勇氣。可以在例行主管會議中設立固定的「異見時間」——每次議程保留十分鐘，專門讓與會者提出與主流方向不同的觀察或疑慮，不做即時評判，只做記錄。讓「說不同的話」有一個結構性的位置，比鼓勵個人勇敢更有效。

第二步，高層主管需要帶頭示範「我也可以說錯」。每季一次，主管公開分享一個自己判斷失誤的決策與學習，這個行動傳遞的訊息是：在這裡，誠實比正確更重要。`,

'CP_A':`團隊CP偏高、A相對偏低，代表組織的決策傾向依賴職權與經驗，而非系統性的資訊蒐集與分析。中間主管在這種環境中，往往會選擇配合高層的方向，而不是提出基於數據的不同意見，因為「用事實說話」的文化尚未充分建立。

CP帶來的優勢是執行力與問責機制，但在資訊流通不足的情況下，CP容易演變成「上面說什麼就做什麼」的執行文化，而非「看清楚現實再決定怎麼做」的判斷文化。中間主管的沉默，有時不是膽怯，而是他們也不確定自己的觀察是否可信。

建議導入定期的「現狀回報」機制：每月由各部門主管提交一份不超過一頁的簡短報告，說明目前最大的業務障礙是什麼、自己尚未掌握足夠資訊的決策是哪些。讓「我不確定」成為可以說出口的專業語言。

第二步，針對重大決策建立「異見登錄」流程：任何主管若對某項決定有保留，可以在決策記錄中留下自己的觀點，即使最終執行的方向不同。這個機制讓說真話有了制度保障，而不只是個人選擇。`,

'CP_FC':`團隊CP偏高、FC偏低，顯示組織文化重視規範與一致性，自發性與創造力的表達空間相對受限。中間主管在這樣的環境中，往往傾向壓抑即興的判斷，只說符合組織期望的話。久而久之，說話變得越來越像在交報告，而不是在溝通。

CP的價值在於讓組織有可預期的秩序，但當FC的聲音長期被壓制，中間主管最終會失去說出「我覺得這個方向有問題」的直覺，因為那種直覺已經很久沒有被使用了。

建議創造一些「低風險的練習場景」。可以在部門內部設立月度的非正式檢討會，允許主管用非正式的語言描述他們對現況的感受，不需要套用正式的報告框架。這類場合讓真實的聲音有機會出現，同時不觸碰正式決策的邊界。

第二步，明確區分「正式場合的標準語言」與「內部討論的真實語言」，讓主管清楚知道在哪些情境下說真話是被鼓勵的，不需要在所有場合都維持同一種溝通方式。`,

'CP_AC':`團隊CP偏高、AC也偏高，是組織文化中最容易讓中間主管陷入順應困境的組合。高CP製造了強烈的評判氛圍，高AC讓人習慣在這種氛圍中選擇配合，兩者疊加，「說真話」的代價在中間主管的感知中會被系統性地高估。

這個組合的特別之處在於，主管們未必沒有不同的意見，而是他們已經非常熟練地在開口之前就預判了「說出去的後果」，並選擇不說。這不是溝通能力的問題，而是組織系統在無形中訓練出來的行為模式。

要打破這個模式，需要從獎勵機制入手。建議在年度績效評核中加入「有效提出異見」的評估維度——不是評估異見的結果，而是評估主管是否有能力清楚表達與主流不同的觀點，並說明理由。讓說真話在制度上有正向的回報。

第二步，高層主管需要主動降低評判的頻率。當中間主管提出不同意見時，第一個回應不應該是「這樣不對」，而是「說說你的考量」。這個接球的方式，決定了下次還有沒有人願意開口。`,

'NP_CP':`團隊NP偏高、CP偏低，組織整體氛圍溫暖、重視關係，但相對缺乏清晰的標準與原則框架。中間主管在這種環境中習慣順應，往往不是因為懼怕被評判，而是因為「不想破壞和諧」——說真話的代價，在他們的感知中，是傷害關係。

NP文化的優勢在於高度的團隊凝聚力與心理安全感，但當這種安全感建立在「大家都不說讓人不舒服的話」的基礎上，組織就會逐漸失去接收真實訊號的能力。中間主管的沉默，往往包裝在「我是為了大局著想」的善意之下。

建議從「關係中的直接溝通」開始培養。可以在主管培訓中導入「溫柔而直接」的回饋框架：先確認對方感受到被支持，再清楚說出自己的觀察，最後提出具體的建議。這個結構讓直接說話不等於破壞關係，而是關係成熟的表現。

第二步，讓主管理解「沉默也是一種傷害」。當真實的問題因為維持和諧而沒有被說出來，最終承擔後果的往往是整個團隊。協助主管看見，說真話不是在傷害關係，而是在真正為關係負責。`,

'NP_A':`團隊NP偏高、A偏低，重視關係與感受的文化讓人感覺安全，但在需要依據事實做出清晰判斷的場合，組織的分析能力與客觀思考習慣相對薄弱。中間主管說真話的障礙，不只來自人際顧慮，也來自對自己判斷的不確定。

NP的強項在於建立信任與關懷文化，但在缺乏A支撐的情況下，主管容易以「氣氛怎麼樣」取代「事實是什麼」，最終說出口的，是他感覺對方想聽的，而不是他真正觀察到的。

建議加強決策討論中的「事實核對」習慣。在每一次重要討論結束前，由與會者共同確認：我們剛才說的哪些是觀察到的事實，哪些是我們的詮釋或推測？這個區分動作，幫助主管建立用事實說話的習慣，而不只是用感覺說話。

第二步，為中間主管建立定期的數據回顧機制，讓他們習慣在對話之前先整理客觀資訊。有了具體的數據作為支撐，說出不同意見的底氣會明顯增加。`,

'NP_FC':`團隊NP偏高、FC偏低，整體文化以關懷與穩定為主軸，自發的熱情與直接的表達相對受到抑制。中間主管的順應，在這個組合中常常以「我不想讓大家承受太多」的形式出現——他們壓下自己的真實判斷，是因為在乎別人的感受。

這是一種很隱性的沉默：外表是體貼，內部是壓抑。當NP文化過強，主管會習慣性地把「讓對方舒服」放在「說出真實觀察」之前，最終導致重要的訊號在傳遞過程中被反覆稀釋。

建議區分「照顧感受」與「回避真相」的差異，並在主管培訓中明確討論。可以讓主管練習用「說出來比不說出來更照顧對方」的角度重新詮釋直接溝通，幫助他們看見，真正的NP是說真話，而不是讓對方暫時不難受。

第二步，在團隊中建立「我有一個觀察想分享」的溝通慣例，讓主管可以用溫和但清晰的方式提出自己的看法，而不是在沉默與直接衝突之間二選一。`,

'NP_AC':`團隊NP偏高、AC也偏高，這是最容易形成「好好先生文化」的組合。每個人都在照顧別人的感受，也都在配合整體的氛圍，表面上和諧，但真實的判斷與不滿卻從未進入正式的討論。

在這樣的環境中，中間主管的沉默不是冷漠，而是一種過度的善意——他們選擇不說，是因為不想成為那個「讓大家不舒服的人」。但當所有人都這樣想，組織就會進入一種集體的自我欺騙狀態。

建議從結構上創造「允許不同意」的空間。可以在決策討論中採用「紅隊機制」：指定一位主管扮演反方，負責提出對當前方案的疑慮與挑戰。這個角色輪流擔任，讓「說不同的話」成為一種組織賦予的責任，而不是個人的冒險。

第二步，高層主管需要主動詢問「你不同意的地方是什麼」，而不是等待下屬自己開口。在NP加AC的文化中，主動邀請異見，比開放空間等待更有效。`,

'A_CP':`團隊A偏高、CP偏低，分析能力強，但在建立清晰的原則與標準方面相對薄弱。中間主管說真話的障礙，往往來自於「我分析出了問題，但不確定自己有沒有資格說」——理性判斷與職權邊界之間的模糊感，讓他們選擇沉默。

A的價值在於讓組織的判斷有事實基礎，但在缺乏CP的情況下，主管可能擁有清晰的分析，卻缺乏表達異見的框架與底氣。他們知道問題在哪裡，但不知道自己有沒有責任、有沒有立場說出來。

建議明確定義中間主管的「發言責任範圍」。讓每一位主管清楚知道，在哪些業務範疇內，他們不只有權說出自己的觀察，而且有責任這樣做。把說真話從個人選擇，轉化為職責的一部分。

第二步，建立分析報告的定期呈現機制，讓主管的觀察有正式的輸出管道。當說真話有了固定的形式與場合，它就不再是一個需要每次重新評估風險的行動，而是例行公事的一部分。`,

'A_NP':`團隊A偏高、NP偏低，理性分析能力強，但對人際溫度與關係動態的感知相對薄弱。中間主管的順應，在這個組合中往往表現為一種「我說了也沒用，不如省事」的理性判斷——他們不是不敢說，而是評估過後認為說了不會有效果。

A文化讓組織擅長分析問題，但在缺乏NP的情況下，組織內部的信任基礎可能不夠厚實，主管不確定自己的聲音是否真的被重視。這種不確定性會讓他們在投入說真話的成本之前，先做一個理性的成本效益計算，然後選擇不說。

建議從「回應的品質」入手。當主管提出觀察或問題時，高層的回應方式需要讓他們感覺被認真對待——不是要求高層同意每一個意見，而是確保每一個意見都得到實質的回應，而非被忽略或敷衍。讓說真話有可見的回報。

第二步，建立正式的「意見追蹤」機制：中間主管提出的重要觀察，需要在一定時間內收到明確的回應，說明是否採納、理由為何。這個機制讓主管知道，他們的聲音進入了系統，而不是消失在空氣中。`,

'A_FC':`團隊A偏高、FC偏低，擅長邏輯與分析，但在即興表達和直接說出內心感受方面相對有限。中間主管在這個環境中，往往會選擇說「經過評估後，我認為目前的方向沒有明顯問題」，而不是說「我其實對這件事有點擔心」——因為把感覺轉換成分析語言，是他們最熟悉的模式。

A的優勢是讓討論有事實基礎，但當FC偏低，主管的真實直覺往往被自我審查過濾掉，只有能被「理性說明」的觀察才會進入對話。而很多時候，最有價值的訊號，恰恰是那些還沒辦法被完整分析的直覺。

建議在討論機制中加入「直覺空間」。在重大決策討論中，明確邀請主管分享他們「還說不清楚為什麼，但感覺有點不對」的直覺，不要求立即提供分析支撐。讓不完整的觀察也有進入討論的管道。

第二步，訓練主管使用「觀察性語言」而非純分析語言：「我注意到這件事……我的直覺是……我還不確定原因，但我想提出來討論」。這個表達框架降低了說真話的準入門檻。`,

'A_AC':`團隊A偏高、AC也偏高，分析能力強，同時對他人期待高度敏感。中間主管在這個組合中面臨一個特別精緻的困境：他們通常能清楚分析出問題所在，也能精確預測說出去之後高層的反應，然後選擇不說——因為他們「算出來」沉默的風險最低。

這種沉默是計算過的，不是衝動的，因此也特別難改變。要打破它，需要改變的不只是主管的行為，而是組織回應異見的方式。

建議導入「安全說真話」的制度保障。可以建立匿名的管理意見回饋管道，讓主管可以在不具名的情況下提出對組織決策的觀察與疑慮。重要的是，這些意見需要有正式的回應機制，而不是進入黑洞。

第二步，在主管培訓中明確討論「沉默的代價」：當擁有關鍵資訊的人選擇不說，組織會付出什麼樣的成本？讓主管理解，他們的沉默不是中立，而是一個有後果的選擇。`,

'FC_CP':`團隊FC偏高、CP偏低，整體氛圍活躍、有創意，但在原則與標準的建立上相對薄弱。中間主管說真話的障礙，在這個組合中往往以另一種形式出現：他們可能說了太多、但說的不夠到位——直接表達感受或反應，卻缺乏清晰的立場與論據，導致說了等於沒說。

FC的活力讓組織充滿能量，但在CP不足的情況下，主管的表達容易停留在情緒層次，而非形成有說服力的論點。真正有效的「說真話」，需要的不只是勇氣，還有清晰的論述框架。

建議為主管提供「結構化異見表達」的培訓。讓他們練習把直覺轉換成有邏輯的陳述：「我觀察到的現象是……我認為背後的原因可能是……我建議可以考慮的方向是……」這個框架讓直接的感受有了組織系統可以接收的形式。

第二步，建立「意見提案」的標準格式，讓主管在提出不同看法時，有一個固定的表達結構，而不是完全依賴當下的即興發揮。格式的存在，反而讓說真話變得更容易，因為它降低了「我不知道怎麼說」的焦慮。`,

'FC_NP':`團隊FC偏高、NP偏低，充滿活力與即興創意，但在關懷他人感受與建立信任方面相對薄弱。中間主管在這個環境中的順應，有時來自一種「說了也沒人在意」的感覺——不是不敢說，而是不確定自己的聲音有沒有被真正聆聽。

FC的能量讓組織有很強的啟動力，但在NP不足的情況下，內部的信任基礎可能不夠穩固，主管之間缺乏足夠的安全感去表達脆弱或不確定。真正的說真話，需要的不只是表達的勇氣，還需要感覺對方真的在聽。

建議在主管會議中建立「被聽見」的結構。可以在每次會議開始時，讓每位主管用兩分鐘分享目前最大的一個工作挑戰，其他人只聽、不評論。這個練習建立的，是「我說了，有人在聽」的體驗，這是後續更深度說真話的基礎。

第二步，主管一對一的頻率與品質需要提升。讓中間主管知道，他們有一個固定的空間可以說出工作上的真實狀況，而且那個空間的主要功能是讓他們被聽見，不是被評估。`,

'FC_A':`團隊FC偏高、A偏低，充滿活力與即興判斷，但在系統性分析與事實核對方面相對薄弱。中間主管在這個組合中，往往有說真話的意願，但說出來的內容缺乏足夠的邏輯支撐，導致他們的觀察被當作情緒反應而不是有效的業務判斷。

FC讓組織有強烈的表達慾，但在A不足的情況下，主管可能習慣以直覺代替分析，以感受代替事實。長期下來，他們的聲音在組織決策中的份量會逐漸降低，最終自我放棄表達。

建議為主管建立「觀察日誌」習慣：定期記錄工作中看到的異常、趨勢或潛在問題，並練習為每一條觀察找到至少一個可以支撐它的具體事實。這個習慣讓直覺有了可以對話的形式。

第二步，在組織內部建立「數據文化」，讓每一個重要的業務討論都包含數據環節。主管的說真話，需要有數據作為後盾，才能在評估導向的場合有效傳遞。`,

'FC_AC':`團隊FC偏高、AC偏低，整體氛圍開放、個人表達強，但在讀取他人需求與調整自我表達方面相對薄弱。中間主管在這個組合中說真話的問題，往往不是說得不夠多，而是說的方式讓對方難以接收——直接、快速、情緒性的表達，在需要謹慎對待的場合容易引發防衛。

FC的直接是真實的優勢，但當AC的感知能力不足，主管可能無法有效評估當下說話的時機與方式，導致說了真話但沒有達到說真話的目的。

建議培養「說話前的兩秒停頓」習慣：在表達重要觀察之前，先問自己「現在是說這件事的好時機嗎？」與「我想怎麼說，對方才能真正聽進去？」這兩個問題，不是讓主管壓下真實的想法，而是讓真實的想法能夠被更有效地傳遞。

第二步，為主管提供「情境感知」的訓練，讓他們學習識別不同場合對溝通方式的不同要求，並練習在保持真實的前提下調整表達的形式。`,

'AC_CP':`團隊AC偏高、CP偏低，對人際動態高度敏感，但在建立自身原則與立場方面相對薄弱。中間主管的順應，在這個組合中幾乎是一種深層的文化慣性——大家都知道要配合，但沒有人清楚自己真正的立場是什麼，因為那個立場從來沒有被認真建立過。

AC的敏感是很珍貴的資產，它讓主管能夠讀取組織的情緒地圖。但在缺乏CP的情況下，這份敏感容易演變成被動的回應，而不是主動的判斷。主管知道什麼讓人不舒服，但不知道什麼是自己真正堅持的。

建議從個人立場建立開始。可以透過工作坊或教練對話，幫助每位主管釐清：在他的業務範疇內，他真正不願意妥協的核心原則是什麼？當一個人有了清楚的立場，說出不同意見就不再是冒險，而是自我表達。

第二步，組織層面需要明確傳遞「有立場的主管更有價值」的信念。讓主管理解，配合不是他們最重要的貢獻，清晰的判斷才是。`,

'AC_NP':`團隊AC偏高、NP偏低，高度配合的文化加上相對薄弱的關懷互動，形成了一種特殊的沉默形態：主管們各自壓抑著自己的想法，卻沒有足夠的信任基礎可以私下相互傾訴，更遑論在正式場合說出來。

AC的和諧傾向在組織中製造了一個假象——因為沒有明顯的衝突，管理層可能誤以為內部共識良好。但實際上，大量的業務觀察與不滿，正在以沉默的形式累積。

建議先建立信任，再期待真話。可以透過小組輔導或主管交流會，讓主管在一個安全的小圈子裡先練習說出工作中的真實感受。信任是說真話的前提，而信任需要時間與刻意的投入才能建立。

第二步，讓每位主管都有一個指定的「對話夥伴」，可以是平行部門的同儕，定期進行非正式的業務對話。這個安排讓主管有一個可以說真話的場所，也讓組織逐漸建立起橫向的信任網絡。`,

'AC_A':`團隊AC偏高、A偏低，順應文化強，同時缺乏足夠的分析框架支撐主管的判斷。中間主管在這個組合中的沉默，有時來自一種「我感覺有問題，但我說不清楚哪裡有問題」的困境——他們有直覺，但沒有工具把直覺轉換成可以進入組織討論的形式。

AC的敏感讓主管能夠及早感知到問題的苗頭，這是非常有價值的能力。但在A不足的情況下，這份感知往往停留在模糊的不安，無法被轉化為清晰的觀察與建議，最終以沉默告終。

建議提供「問題描述」的工具訓練，幫助主管學習把模糊的感受轉換成具體的陳述：「我注意到最近……，這讓我擔心……，我不確定原因，但我想提出來討論」。降低說真話的表達門檻，往往能解放被壓抑的觀察。

第二步，讓主管習慣在重要會議之前，先用五分鐘寫下自己的觀察與疑慮。把想法外化成文字的過程，能夠幫助他們把模糊的直覺整理成可以說出口的具體觀點。`,

'AC_FC':`團隊AC偏高、FC偏低，高度配合的文化加上受抑制的自發性與直接性，形成了一種「大家都很乖、但沒有人真的投入」的組織樣態。中間主管說真話的能力，在這個組合中幾乎是從根本上被系統性地壓制——不只是不敢說，連想說的衝動都已經很弱了。

要在這個基礎上建立說真話的文化，需要的不是一次性的訓練，而是長期的文化耕耘。

建議從「重新允許表達」開始。可以在組織內部試行「創意免責區」：在特定的場合與時間範圍內，主管可以提出任何想法，不論多麼不成熟，不會被評判，也不會被當作正式立場。讓表達本身重新成為一件安全的事。

第二步，高層主管需要主動展示「我也有不確定的時候」。當組織看到頂層的主管願意承認自己的疑惑與局限，中間主管才會開始相信，說出不完美的想法是被允許的。`
},

// ════ 議題 1：團隊創新力與主動性不足 ════
{
'CP_NP':`團隊CP偏高、NP偏低，在高標準與強執行力的驅動下，組織的創新力往往面臨一個結構性的困境：主管對「正確」的定義太清晰，反而壓縮了嘗試「不確定」的空間。創新需要的試錯文化，在高CP環境中很難自然生長。

CP的優勢是確保執行品質，但當組織的主要驅動力是「不能出錯」，主動提出新想法的風險感知就會被系統性地高估。中間主管最終學會的，是如何精確執行指令，而不是如何主動探索可能性。

建議在組織中刻意建立「實驗區」：允許特定的業務範疇以更高的風險容忍度運作，讓主管可以在這個範圍內提出並測試新想法，不需要在前期就達到與正式業務同等的標準。創新需要一個不同的評估框架，而不只是寬鬆的鼓勵。

第二步，修改對主管的評核指標，加入「有效嘗試」的維度——評估的不是新想法的成功率，而是主管是否有能力識別機會、設計實驗、從結果中學習。讓主動提案與試錯在制度上有正向的回報。`,

'CP_FC':`團隊CP偏高、FC偏低，組織運作精準、規範完整，但自發的熱情與創意表達相對受到壓制。這個組合中的創新力不足，是最典型的「執行文化擠壓探索文化」的樣態——組織越追求標準化，離創新就越遠。

FC的能量是創新的起點，但在高CP的環境中，那些還沒有被驗證的想法，在開口之前就已經被主管自我審查過濾了。因為他們知道，不夠成熟的提案在CP偏高的評估文化中不容易獲得認可。

建議為創意想法建立一個「低門檻的入口」：設立定期的創意腦力激盪會議，明確宣告這個場合的規則是「不評估可行性，只收集想法」，讓FC的聲音有一個不被立即評判的表達空間。分開「發散」與「聚焦」的討論，是讓創意在CP文化中存活的關鍵。

第二步，讓主管定期接觸組織外部的刺激，包括拜訪不同產業的企業、參與跨界社群活動，或閱讀與本業無關的趨勢報告。新想法的來源，往往不在舒適區內。`,

'NP_CP':`團隊NP偏高、CP偏低，關懷文化濃厚，但在推動改變所需的決斷力與方向感方面相對薄弱。創新在這個組合中往往卡在「大家都覺得不錯，但沒有人推它走」的狀態——有溫度，缺力道。

NP的優勢在於創造讓人願意嘗試的心理安全感，這是創新文化的重要基礎。但在缺乏CP的情況下，組織容易在探索階段耗費大量時間，卻難以收斂成明確的行動方向。

建議為創新流程引入明確的「決策節點」：每一個創意探索都需要設定評估截止日，超過時限即進行決策，不論結果是繼續、調整或放棄。讓探索有時間邊界，才能避免永遠在討論而沒有行動。

第二步，指定創新專案的「負責人」而非「推動小組」。在NP文化中，大家習慣共同承擔，但創新需要一個有決策權的個人來驅動，而不是委員會式的共識決策。`,

'A_FC':`團隊A偏高、FC偏低，分析能力強但創意自發性相對薄弱，是一個很常見的「分析型組織創新困境」。主管擅長評估別人提出的想法，卻較少主動發起新的探索。創新在這個組合中容易變成一個「等待被分析的對象」，而不是一個主動被追求的目標。

建議改變創新的啟動方式。不要依賴自下而上的想法湧現，而是由管理層主動設定「探索命題」：我們想解決的最重要的客戶問題是什麼？哪個業務環節如果改善，影響最大？讓創新從問題定義開始，發揮A的分析強項。

第二步，引入設計思考或精實創業的工作坊，讓主管體驗一套結合分析與創意的系統性創新方法，幫助他們在熟悉的分析框架中找到創新的路徑，而不是要求他們完全切換到不熟悉的創意模式。`,

'FC_CP':`團隊FC偏高、CP偏低，充滿創意能量與主動性，但在將創意轉換成結構化的執行計畫方面相對薄弱。創新力的問題在這個組合中往往不是「沒有想法」，而是「想法很多但落地很少」——主管有熱情啟動，卻缺乏把創意推進到完成的紀律與框架。

FC的活力是創新的起點，但在CP不足的情況下，組織容易陷入「永遠在開始新的事情，但沒有完成舊的事情」的循環。真正的創新需要的不只是靈感，還需要將靈感轉化為系統性執行的能力。

建議為創新專案建立明確的「完成標準」：每一個被啟動的創新嘗試，都需要有清楚的交付物定義、時程規劃與負責人。讓主管在提出新想法的同時，也承諾相應的執行路徑。

第二步，建立「創新組合管理」機制：限制同時進行的創新專案數量，讓組織的創意能量能夠聚焦在最有價值的方向，而不是分散在無數個半完成的嘗試上。`,

'AC_CP':`團隊AC偏高、CP偏低，整體順應文化強，缺乏明確的方向感與推動改變的主導力。這個組合中的創新困境，是最根本的一種：主管習慣等待指令，不習慣主動提出新方向，因為整個文化沒有建立「個人主動提案是有價值的」的預期。

要在這個基礎上建立創新文化，需要從頂層開始主動賦予主管創新的職責。建議明確告知每位主管：他們被期待在自己的業務範疇內，每季提出至少一個改善或創新的方向，而不是等待高層告訴他們要做什麼。

第二步，為主管提供充分的資訊支持：市場趨勢報告、競爭分析、客戶訪談結果，讓他們有足夠的材料來形成自己的觀點。在AC文化中，主動提案的最大障礙往往是「我不確定我的想法是否值得提出」，充足的資訊能夠提升他們提案的底氣。`
},

// ════ 議題 2：新人留不住、離職率偏高 ════
{
'CP_NP':`團隊CP偏高、NP偏低，是最常見的新人留任困境組合。高標準的執行文化讓組織能夠確保工作品質，但對於剛進入職場或換到新環境的新人而言，感受到的往往是「高壓評估」而非「被支持成長」。新人離職的主要原因，在這個組合中通常不是「工作太難」，而是「感覺自己一個人在撐，沒有人在乎我有沒有跟上」。

CP文化的優勢在於清晰的標準，讓新人知道什麼叫做做好了。但當NP的溫度不足，新人在達到標準之前，最需要的心理支持往往付之闕如。他們可能很快就確認「這裡的標準很高」，但還來不及建立「我在這裡有機會成長」的信心，就已經選擇離開。

建議導入「新人夥伴制度」：為每一位新人指定一位資深員工擔任夥伴，職責不是教工作，而是在入職前三個月，每週固定進行一次非正式的一對一對話，讓新人有機會說出困惑、挑戰與感受，而不是等到問題累積到無法承受才浮出水面。

第二步，修改主管對新人的評估方式：在入職的前九十天，將評估重心從「是否達到標準」轉移到「是否正在有效學習」。讓新人的進步軌跡，而非起點位置，成為這段時間的主要評量維度。`,

'NP_CP':`團隊NP偏高、CP偏低，溫暖的關懷文化讓新人在入職初期感覺良好，但在缺乏清晰標準與成長框架的情況下，新人可能逐漸感到迷失——他們感覺被照顧，但不確定自己在這裡能夠學到什麼、成長到哪裡。這種不確定感，往往在六到十二個月後開始演變成離職的動機。

建議為新人建立清晰的「成長路徑圖」：明確說明在第一年的不同階段，他們預期能夠獲得哪些技能、承擔哪些責任、達到哪些里程碑。讓成長的方向有具體的可見度，而不只依賴溫暖的氛圍維持動力。

第二步，建立定期的「績效對話」機制：每季與新人進行一次正式的回顧，不只評估工作表現，也討論他們的學習進度與下一階段的發展目標。讓標準清晰，讓期望對齊，讓成長可見。`,

'A_NP':`團隊A偏高、NP偏低，理性分析文化讓工作討論聚焦在事實與效率，但在關懷新人的情感需求與建立歸屬感方面相對投入不足。新人在這個環境中，往往能夠快速理解工作的邏輯，但很難感覺到「我屬於這個團隊」，這種歸屬感的缺失，是這個組合中常見的離職前兆。

建議在主管的例行工作中加入「關係建立」的刻意行為：每週與新人進行一次五到十分鐘的非正式對話，不談工作進度，只問「最近怎麼樣」「有沒有遇到什麼困難」。這個小小的投入，對建立歸屬感的效果遠超預期。

第二步，設計新人的「社交融入」路徑：在入職的前三個月，安排新人與不同部門的同事進行一對一的認識對話，讓他們在業務連結之外，也建立個人層面的人際網絡。歸屬感往往來自具體的人際連結，而不是組織文化的抽象描述。`,

'FC_NP':`團隊FC偏高、NP偏低，組織有強烈的能量與活力，但在細緻地照顧新人的需求與建立個人連結方面相對薄弱。新人可能很快融入這個充滿活力的環境，但在遭遇困難或挫折時，可能感覺缺乏足夠的支持與關懷。

建議加強一對一的連結投資：讓每位主管在新人入職的前三個月，每兩週安排一次專屬的一對一對話，重點不是進度追蹤，而是真正了解新人的狀態與感受。讓個人的連結在集體的活力中也有空間。

第二步，設計「新人關懷節點」：在入職的第一週、第一個月、第三個月，由主管主動安排非工作性質的對話，詢問新人的整體適應狀況。讓關懷不是在問題出現後的反應，而是在問題出現前的主動投入。`,

'AC_NP':`團隊AC偏高、NP偏低，和諧的文化讓人際衝突最小化，但對於新人個人需求的主動關照相對不足。在這個組合中，新人可能很快學會了組織的潛規則，但他們個人的困難、挑戰與情感需求，往往沒有被足夠地看見與回應。

建議為主管建立「主動關懷」的日曆習慣：每週在行事曆中固定安排與新人的非正式對話，讓關懷不是偶發的，而是有節律的。主動的頻率，往往比關懷的深度更重要，因為它傳遞的是「我持續在想著你」的訊息。

第二步，設計「入職體驗調查」：在新人入職後的第三十天、九十天與一百八十天，各進行一次匿名或半匿名的體驗調查，讓他們可以安全地表達真實感受。用系統性的方式彌補人際主動性的不足。`
},

// ════ 議題 3：跨部門溝通卡關 ════
{
'CP_NP':`團隊CP偏高、NP偏低，跨部門的摩擦在這個組合中往往有一個清晰的根源：每個部門都有強烈的標準與原則，但缺乏足夠的「先理解對方在乎什麼」的意願與能力。CP文化讓各部門的邊界很清晰，但也讓邊界成為壁壘——我的標準很重要，你的感受是你的事。

建議從「跨部門理解」開始，而不是從「協作流程」開始。定期安排跨部門主管的「業務互訪」：讓每位主管輪流到另一個部門實際觀察半天的工作，了解對方日常面臨的挑戰與壓力。在有了真實的理解之後，協作的意願會自然提升。

第二步，在跨部門衝突的處理流程中，加入「雙方優先陳述各自目標」的步驟：在討論解決方案之前，先確認各部門在這件事上的核心目標是什麼，通常會發現目標的重疊程度遠超過想像，衝突的本質是達成方式的分歧，而不是根本利益的對立。`,

'NP_CP':`團隊NP偏高、CP偏低，關懷文化讓內部關係溫暖，但跨部門協作在這個組合中容易出現「大家感情很好，但事情推不動」的困境。沒有清晰的界面定義與責任分工，協作容易變成一個溫暖但模糊的互相等待。

建議為每一個重要的跨部門協作流程，建立明確的「RACI矩陣」：清楚定義誰負責執行、誰做最終決定、誰需要被諮詢、誰需要被告知。讓溫暖的關係建立在清晰的責任框架上，才能讓協作真正有效率。

第二步，為跨部門的關鍵交付設立明確的「服務承諾」：每個部門向其內部客戶部門承諾的回應時效、交付品質與溝通方式，讓協作期望有清晰的共識，而不是依賴隱性的善意。`,

'A_CP':`團隊A偏高、CP偏低，分析能力強，但跨部門協作在缺乏清晰的決策框架時，容易陷入「分析很多但決策很慢」的困境。每個部門都能清楚描述問題，但沒有人有足夠的授權或意願做出跨部門的整合決策。

建議建立「跨部門決策快速通道」：對於符合特定條件的跨部門議題，授權相關主管在不需要向上呈報的情況下自行解決，縮短決策鏈，讓協作不被繁複的審批流程阻礙。

第二步，設立定期的「跨部門議題解決會議」：讓需要跨部門協調的事項有固定的討論場合，避免在臨時的溝通中解決需要多方協調的複雜問題。`,

'FC_NP':`團隊FC偏高、NP偏低，有強烈的創意動能，但跨部門協作在缺乏足夠的關係投資下，容易出現「我的想法很好，但沒有人願意配合」的困境。FC的直接與快速讓跨部門推進有衝勁，但在缺乏NP的情況下，往往沒有足夠地照顧到協作方的感受與需求。

建議在跨部門推進重要專案之前，安排「關係建立」的前置步驟：讓推動方的主管先與協作方的主管進行一對一的非正式對話，了解對方目前的工作重點與壓力，再說明自己的需求。讓協作從理解開始，而不是從要求開始。

第二步，建立跨部門的「定期同步機制」：讓有持續協作需求的部門，每兩週進行一次簡短的同步會議，分享各自的優先級與資源狀況，讓協作需求的提出有足夠的前置時間，避免臨時插隊造成的摩擦。`,

'AC_A':`團隊AC偏高、A偏低，各部門習慣配合，但缺乏系統性地識別協作瓶頸與設計改善方案的能力。跨部門的摩擦在這個組合中往往長期存在，因為大家都選擇忍耐而不是主動推動改變，同時也缺乏分析問題根源的框架。

建議啟動一次系統性的「協作流程盤點」：邀請各部門主管共同描繪跨部門的主要工作流程，標記摩擦最多的節點，並分析摩擦的根本原因。讓問題從個案層次上升到系統層次，才能找到真正有效的解決方案。

第二步，設立「跨部門改善小組」：由各部門指派一位有改善意願的主管，共同負責識別與推動跨部門協作的優化，讓改善行動有明確的責任主體，而不是依賴所有人自發性的投入。`
},

// ════ 議題 4：主管給回饋的能力不足 ════
{
'CP_NP':`團隊CP偏高、NP偏低，這個組合中的主管給回饋困境是最典型的：有清晰的標準，卻缺乏溫柔傳遞的能力。他們知道問題在哪裡，也有足夠的清晰度說清楚，但說出來的方式往往讓對方感覺到的是批評，而不是支持。

長期下來，這樣的回饋方式會製造防衛文化：下屬在主管面前呈現出沒有問題的表象，而不是帶著真實的困難來求助，因為他們已經學會了，誠實等於被評判。這讓主管的回饋喪失了真正的功能。

建議為主管提供「回饋框架」訓練：學習在給出發展性回饋之前，先確認對方感覺到被支持的基礎。具體的做法是，在說出「這裡可以更好」之前，先說「你在這個部分做到了……這讓我看到你的……」，讓對方知道回饋的出發點是幫助他成長，而不是評判他的不足。

第二步，讓主管練習「問問題的回饋」：把「你這樣做不對」改成「你當時是怎麼考慮這個決定的？」讓對方先說，主管再補充自己的觀察。這個方式保留了CP的清晰標準，同時加入了NP的理解意願。`,

'NP_CP':`團隊NP偏高、CP偏低，主管的回饋困境是另一種形式：溫暖有餘，清晰不足。他們在乎下屬的感受，不想讓人難受，結果往往說了半天回饋，對方不確定自己到底哪裡需要改善。這種模糊的回饋，比沒有回饋更讓人困惑。

在NP文化強的環境中，主管常常以為表達了在乎就等於給了回饋，但下屬需要的不只是感覺被照顧，他們需要清楚地知道「我需要在哪裡不同、具體要做到什麼」。

建議培養主管「具體化回饋」的習慣：每一條發展性的建議，都需要回答三個問題：我觀察到的具體行為是什麼？這個行為帶來了什麼影響？我建議可以怎麼做不同？讓回饋從感覺層次落地到行為層次，才能真正幫助對方改善。

第二步，讓主管練習在給出回饋後，確認對方的理解：「你聽到我說的，你會怎麼做不同？」這個問題既確認了對方是否理解，也讓主管知道是否需要進一步澄清。`,

'A_NP':`團隊A偏高、NP偏低，主管在給回饋時的優勢是清晰與邏輯，但在創造讓對方感覺安全的回饋氛圍方面相對薄弱。下屬在這個環境中收到的回饋往往很準確，但感覺像是在接受評估，而不是在得到支持，這讓回饋的接受度大打折扣。

建議讓主管在回饋前先建立連結：在正式說出觀察之前，先問一句「最近工作上感覺怎麼樣？」「這個專案對你來說最大的挑戰是什麼？」讓對方先說，主管再在對方的脈絡中提出觀察，讓回饋感覺是對話，而不是單向的評判。

第二步，讓主管學習在給出回饋後表達信心：「我觀察到這個部分有提升空間，但我也看到你的……讓我相信你有能力改善這件事。」讓回饋以對對方能力的肯定作為結語，而不是留下一個開放的問號。`,

'FC_CP':`團隊FC偏高、CP偏低，主管給回饋的問題往往是太即興、缺乏框架。FC的直接讓他們說得很快，但沒有清晰的邏輯架構，對方接收到的是情緒反應，而不是可以行動的建議。

建議讓主管養成「回饋前先想三秒」的習慣：在說出回饋之前，先在腦中確認「我要說的觀察是什麼、我想建議的改變是什麼、我期待的成果是什麼」，讓即興的表達有最基本的框架。

第二步，提供主管結構化的回饋模板，讓他們在給重要回饋時有固定的參考格式，避免在情緒高漲的當下說出沒有建設性的話。`,

'AC_CP':`團隊AC偏高、CP偏低，主管在給回饋上面臨一個特別明顯的衝突：他們感知到問題，但缺乏說出來的立場感與主導力，加上順應文化的壓力，讓他們選擇沉默，或是以太過間接的方式暗示，讓對方完全沒有接收到需要改善的訊息。

建議從「給回饋是主管的職責」的信念建立開始。讓主管理解，不給回饋不是溫柔，而是放棄了幫助對方成長的責任。這個信念的轉換，能夠給予主管打破沉默的基本動力。

第二步，讓主管從「正向回饋」開始練習：先從給予清晰、具體的稱讚開始，建立對給回饋這件事的信心與習慣，再逐步引入發展性的回饋。讓給回饋成為一個舒適的日常行為，而不是每次都需要克服巨大心理障礙的事。`
},

// ════ 議題 5：團隊士氣低落 ════
{
'CP_NP':`團隊CP偏高、NP偏低，士氣低落在這個組合中往往有一個共同的根源：人們感覺自己的工作成果被評估，但不感覺自己這個人被看見。高標準的文化清楚告訴大家「什麼是不夠好的」，但很少有人得到「你做的這件事很有價值」的真實回應。

長期在高CP低NP的環境中工作，人會逐漸從「我想把這件事做好」演變成「我不想因為做不好而被批評」，工作的動機從追求意義感轉向迴避懲罰，這是士氣低落最深層的根源。

建議讓「被看見」成為有結構的日常行為，而不是偶發的個人善意。具體做法是：在每週的主管例會中，固定安排一個環節讓主管分享「這週我觀察到哪位團隊成員做了什麼值得認可的事」。讓認可變得系統化，才能在CP主導的文化中持續存在。

第二步，讓主管學習「成就故事」的表達方式：不只說「你做得不錯」，而是說「你在這個專案裡做了……這帶來了……這讓我看見了你的……」讓認可有具體的內容，也讓被認可的人知道自己的哪個部分是被看見的。`,

'NP_CP':`團隊NP偏高、CP偏低，整體氛圍溫暖，但在士氣低落的狀況下，這個組合容易形成一種集體的情感消耗：大家都在照顧別人，卻沒有人確保方向是對的，沒有人說清楚「我們在往哪裡走、為什麼這件事值得努力」。

士氣的問題不只是情感層面的，也有方向感的層面。在NP文化中，主管習慣照顧感受，但有時忘了給予清晰的方向與意義框架。人們不只需要感覺被照顧，他們也需要知道自己的努力指向一個值得的目標。

建議讓主管定期分享組織的方向與目標，並明確連結每個人的工作與更大目標之間的關係。不是一次性的演講，而是在日常的工作對話中反覆確認這個連結：「你做的這件事，對我們的目標的意義是……」

第二步，建立清晰的「進度慶祝」機制：當團隊達到重要的里程碑，主管需要主動且具體地標記這個時刻，讓成就被看見，讓努力有回報。`,

'A_NP':`團隊A偏高、NP偏低，士氣低落在這個組合中往往被解讀為「效率問題」或「動機問題」，而不是「情感連結問題」。主管傾向用分析的方式診斷問題，提出改善方案，但沒有足夠地關注人的感受層面——他們解決了問題，但沒有讓人感覺被看見。

士氣的本質是人對自己在這個地方是否有價值的感受。解決方案與改善行動固然重要，但如果沒有人對個體的存在與貢獻表達真實的在乎，士氣問題很難從根本上改善。

建議讓主管在一對一對話中增加「情感優先」的問題：「你最近感覺怎麼樣？」「有沒有什麼讓你覺得特別有成就感或特別消耗的事？」讓對話不只停留在任務層次，也讓對方感覺到主管在乎的是他這個人，而不只是他的產出。

第二步，建立「貢獻可見性」機制：讓每個人的工作如何影響整個組織的目標，有清晰的追蹤與展示。讓人知道自己的工作是有意義的，是士氣管理中非常重要的基礎工作。`,

'FC_CP':`團隊FC偏高、CP偏低，組織有強烈的活力，但士氣低落可能以一種特殊的形式出現：人們還是很活躍，但這份活力越來越多地流向抱怨和發洩，而不是工作本身。這是士氣低落但尚未完全沉默的形態，是一個需要被認真對待的訊號。

在這個組合中，士氣管理的關鍵是「為能量找到出口」。大家有能量，但可能感覺那個能量沒有被有效地引導，或者感覺努力沒有帶來真實的影響，這讓活力開始轉向負面。

建議建立「改善提案」的快速通道：讓主管能夠快速地回應團隊提出的改善建議，即使不能全部採納，也需要給出清晰的回應，說明哪些會考慮推進，哪些暫時不行，理由是什麼。讓能量感覺到自己是被接住的，而不是被忽視的。

第二步，定期舉辦「聚焦與慶祝」會議：讓團隊一起回顧最近的成果與進展，再共同聚焦下一階段的重點。這個節律讓人感覺到方向感，也讓貢獻有機會被集體看見。`,

'AC_NP':`團隊AC偏高、NP偏低，士氣低落在這個組合中往往是最沉默的一種：沒有明顯的抱怨，沒有明顯的衝突，但人們的投入感與能量都在悄悄地流失。外表看起來一切正常，但實際上大家都在保留自己、不完全投入。

要診斷和改善這種沉默的士氣問題，需要主動且持續地創造對話機會。建議讓主管定期進行「脈動調查」：每月用兩到三個簡單的問題詢問團隊對工作狀態的感受，讓隱藏的不滿有安全的出口，也讓管理層能夠在問題惡化之前感知到訊號。

第二步，讓主管主動且頻繁地表達對個體貢獻的認可：在AC加低NP的組合中，人們習慣默默付出，也習慣不期待被看見。主管的主動認可，能夠打破這個沉默的循環，讓付出感覺是值得的。`
},

// ════ 議題 6：高壓環境下的情緒管理與衝突處理 ════
{
'CP_NP':`團隊CP偏高、NP偏低，在高壓情境下，這個組合最常見的衝突模式是：標準的碰撞。每個人都有很強的「應該怎麼做」，在壓力升高的時候，CP的確信感讓人更難聽進不同的聲音，衝突的升溫速度很快，降溫的能力卻相對薄弱。

在NP不足的情況下，組織缺乏足夠的「情緒緩衝」能力——當衝突發生，主管往往沒有資源和意願先讓情緒冷卻，再回到問題本身，導致許多本來可以解決的業務分歧，演變成關係層面的傷害。

建議為主管建立「暫停協議」：在會議或討論中，任何一方都可以說出「我們先暫停一下」，而不需要解釋原因。這個協議讓暫停不代表軟弱，而是一個被組織認可的情緒管理工具，讓雙方都有機會從反應模式回到選擇模式。

第二步，為主管提供「衝突後對話」的框架：在緊張的討論結束後，讓相關主管在二十四小時內進行一次簡短的確認對話，讓衝突不以沉默和疏遠收場，而是以明確的關係確認作為結語。`,

'NP_A':`團隊NP偏高、A偏低，在高壓情境下，這個組合容易出現「情緒主導、分析缺席」的衝突模式：大家都很在乎彼此的感受，但在衝突時容易陷入相互同理、相互強化情緒的循環，而沒有足夠的A來拉回到事實層次。

建議在衝突處理中引入「事實核對」的步驟：當討論開始情緒化，由一個指定的人問「我們現在確定知道的事實是什麼」，把對話從感受層次暫時移到事實層次，讓A的聲音有機會出來。

第二步，讓主管學習區分「感受的討論」與「解決方案的討論」：前者需要空間與理解，後者需要清晰與邏輯。在同一個對話中混合兩者往往讓兩件事都做不好，明確地先處理感受、再討論解決方案，能讓兩個層次都得到應有的品質。`,

'A_FC':`團隊A偏高、FC偏低，在高壓情境下，這個組合的情緒管理困境往往是「理性壓制感受」：主管在壓力升高時更傾向縮入分析模式，把情緒當作干擾處理，而不是把它當作需要被識別與照顧的訊號。這讓組織在衝突處理上效率很高，但情緒的解決往往被跳過，留下隱性的關係損傷。

建議讓主管學習「情緒識別」：在高壓情境中，養成在內心問自己「現在我的情緒反應是什麼、它在告訴我什麼」的習慣，不是為了壓制情緒，而是為了讓情緒的訊息被有意識地處理。

第二步，在衝突處理流程中加入「情緒確認」的步驟：在進入問題解決之前，先確認雙方的感受被承認——不需要評判對錯，只需要讓對方知道「我聽到你現在的感受是……這對我來說是重要的」。讓情緒有被承認的空間，問題解決才能在一個更穩定的基礎上進行。`,

'FC_AC':`團隊FC偏高、AC偏低，在高壓情境下，這個組合最常見的衝突形態是「表達充分、接收不足」：FC的直接讓情緒和想法快速衝出，但AC偏低讓主管對自己表達的衝擊力感知不足，說完了才發現踩到地雷，甚至沒有意識到自己踩了。

建議讓主管培養「衝擊覺察」的習慣：在說完一段重要的話之後，主動觀察對方的反應，問一句「你聽到我說的，感覺怎麼樣？」讓自己有機會在衝擊還新鮮的時候修復，而不是等問題累積後才被迫處理。

第二步，提供主管「衝突後復盤」的工具：在每一次緊張互動結束後，讓主管用三個問題自我反思：「我說了什麼？」「我想達到的目的是什麼？」「我說的方式有沒有達到那個目的？」讓衝突成為學習的素材，而不是需要被遺忘的事件。`,

'AC_CP':`團隊AC偏高、CP偏低，在高壓情境下，情緒管理的困境往往以「壓抑後爆發」的形式出現：主管在大多數情境中習慣順應、壓下不適，但當壓力累積到臨界點，情緒的爆發往往不成比例，讓周圍的人措手不及。

這個模式的根本問題不是情緒失控，而是缺乏持續性的情緒出口。建議讓主管建立定期的「壓力釋放」機制：每週與信任的同伴或上級進行一次簡短的狀態分享，讓壓力的累積有持續的出口，而不是等待不可控的爆發時機。

第二步，讓主管學習「早期預警」：識別自己在情緒快要超載之前的信號，並在到達這個信號之前主動提出：「我最近壓力比較大，我需要一點時間整理一下。」讓提前說出不舒服，取代事後的失控爆發。`
},

// ════ 議題 7：個人貢獻者升主管後的角色轉換困難 ════
{
'CP_NP':`團隊CP偏高、NP偏低，新晉主管在角色轉換上面臨的最大挑戰，往往是「放不下手」：他們有很清晰的標準，也相信自己能做得比下屬更好，因此在面對下屬的輸出品質時，很難不介入。但當主管習慣親自動手，下屬的成長空間就消失了，主管也永遠無法真正擺脫個人貢獻者的工作模式。

在NP不足的情況下，新晉主管往往也沒有培養下屬的耐心與技能，他們知道什麼是對的，但不知道如何幫助對方理解並達到那個標準。指正有餘，輔導不足，是這個組合中最常見的管理困境。

建議讓新晉主管從「結果管理」轉向「過程陪伴」：不是等到輸出品質不符合標準才介入，而是在任務進行的中間節點，定期與下屬確認方向與進度，在問題還小的時候提供引導。這讓標準能夠被傳遞，同時不剝奪下屬完成任務的機會。

第二步，為新晉主管建立「輔導對話」的技能：讓他們學習用問題引導，而不是用指令指揮。把「這樣做不對，應該這樣」換成「你當時怎麼考慮這個決定？如果考慮到X因素，你覺得會有什麼不同？」讓下屬在對話中自己找到更好的答案，而不是被動接受。`,

'NP_CP':`團隊NP偏高、CP偏低，新晉主管在角色轉換上面臨的挑戰往往是另一種形式：太照顧下屬的感受，以至於給不出清晰的方向與標準。他們可能成為下屬喜歡的主管，但不一定是能夠帶領團隊成長的主管。

這種傾向在主管初期往往看不出問題，甚至獲得好評，但在六到十二個月後，當團隊需要更強的方向感與問責機制，而主管仍然以關懷為主要管理工具時，問題就會開始顯現。

建議讓新晉主管建立「期望管理」的意識：對每位下屬的工作輸出，都需要有清晰的品質期望，並確保對方理解。溫暖的關懷，需要建立在清晰的期望之上，才能轉化為有效的管理，而不只是讓人喜歡的友善。

第二步，提供新晉主管「問責對話」的技能培訓：當下屬沒有達到期望，主管需要學習如何以溫暖但清晰的方式說出來，並與對方共同討論改善計畫。讓問責不等於批評，而是一種對下屬成長的投入。`,

'A_CP':`團隊A偏高、CP偏低，新晉主管在角色轉換上的強項是清晰地分析問題，但在決斷與主導方面相對薄弱。他們可以清楚地描述什麼是對的方向，但在面對複雜的人際動態或需要做出困難選擇的時候，往往傾向繼續分析，而不是做出決定並承擔責任。

管理者的核心能力之一，是在資訊不完全的情況下做出決定，並為這個決定負責。這在以分析為主導的背景下，需要特別刻意的培養。

建議讓新晉主管練習「時限決策」：在重要的管理決定上設定明確的決策截止時間，讓自己在有限的時間內做出最好的判斷，而不是等待更多的資訊。讓在模糊中決策成為一種被練習的能力。

第二步，在組織中建立對新晉主管的明確授權：讓他們知道在哪些範疇內有完整的決策權，不需要逐一請示，讓他們有機會在真實的情境中練習決策與承擔。`,

'FC_AC':`團隊FC偏高、AC偏低，新晉主管在角色轉換上的優勢是充滿能量與熱情，但在理解下屬需求與調整溝通方式方面相對薄弱。他們可能以自己喜歡的方式帶領團隊，卻沒有意識到不同的人需要不同的管理方式，這讓有些下屬感覺到被推著走，而不是被帶著走。

建議讓新晉主管學習「管理風格的多樣性」：認識到不同的下屬在不同的情境下，需要不同程度的自主空間與指引，並練習根據對方的狀態調整自己的介入方式，而不是以固定的方式對待所有人。

第二步，讓新晉主管養成「定期確認」的習慣：每月與每位直屬下屬進行一次一對一對話，明確詢問「我的管理方式有沒有什麼對你特別有幫助的地方，或者讓你感到困難的地方」。讓管理方式本身成為可以被討論與調整的對象。`,

'AC_NP':`團隊AC偏高、NP偏低，新晉主管在角色轉換上最大的挑戰，往往是「缺乏存在感」：他們習慣配合，不習慣主導，在面對需要給方向、做決定、處理衝突的主管職責時，往往感覺自己沒有足夠的主導力。

這種主管可能很受下屬喜歡，因為他不強迫，不評判，但在需要組織做出艱難選擇的時刻，下屬會開始感覺到方向感的缺失，進而失去對主管的信任。

建議讓新晉主管明確認知「主導是一種責任，不是一種傲慢」：主管的職責包含給方向、做決定、處理衝突，這些不是為了彰顯自己，而是為了讓團隊能夠有效運作。從這個角度重新詮釋主導，能夠幫助AC傾向的主管找到主動出擊的動機。

第二步，讓新晉主管每週為自己設定一個「主導練習」：例如在某次會議中主動引導討論走向、或主動提出對某個業務問題的立場，讓主導成為一個被刻意練習的技能，而不是一個需要克服恐懼的冒險。`
}

// 開啟產生報告的 Modal（含議題選擇）
function generateReport(orgCode, orgName, teamTop, teamLow) {
  document.getElementById('reportModalOrgCode').value = orgCode;
  document.getElementById('reportModalOrgName').textContent = orgName;
  document.getElementById('reportModalTeamTop').value = teamTop || '';
  document.getElementById('reportModalTeamLow').value = teamLow || '';
  document.getElementById('issueSelect').value = '';
  document.getElementById('issueNote').value = '';
  document.getElementById('issueNote').placeholder = '選擇議題後會自動帶入對應草稿文案，你可以直接修改。\n\n若選擇「自訂」，請在此輸入針對這個企業的建議內容。\n\n留空代表報告裡不顯示此區塊。';
  document.getElementById('reportModalMsg').style.display = 'none';
  document.getElementById('reportModal').style.display = 'flex';
}

// 當選擇議題時，根據企業的實際組合帶入對應文案
function onIssueSelect() {
  const val = document.getElementById('issueSelect').value;
  const noteEl = document.getElementById('issueNote');

  if (val === '') {
    noteEl.value = '';
    return;
  }

  const idx = parseInt(val);

  // 自訂選項（最後一個）：清空讓使用者手動輸入
  if (idx === ISSUE_LABELS.length - 1) {
    noteEl.value = '';
    noteEl.placeholder = '請在此輸入針對這個企業的建議內容。';
    noteEl.focus();
    return;
  }

  // 取得這個企業的實際組合
  const teamTop = document.getElementById('reportModalTeamTop').value;
  const teamLow = document.getElementById('reportModalTeamLow').value;
  const comboKey = (teamTop && teamLow) ? `${teamTop}_${teamLow}` : null;

  // 從 COMBO_DRAFTS 查對應文案
  const comboDraft = COMBO_DRAFTS[idx] || {};
  let draft = '';

  if (comboKey && comboDraft[comboKey]) {
    // 找到完整的組合文案
    draft = comboDraft[comboKey];
  } else if (teamTop) {
    // 找不到完整組合，找最高狀態相符的第一個
    const fallback = Object.keys(comboDraft).find(k => k.startsWith(teamTop + '_'));
    draft = fallback ? comboDraft[fallback] : (Object.values(comboDraft)[0] || '');
  } else {
    draft = Object.values(comboDraft)[0] || '';
  }

  noteEl.value = draft;
  noteEl.placeholder = '選擇議題後會自動帶入對應草稿文案，你可以直接修改。';
}

// 確認產生報告
async function confirmGenerateReport() {
  const orgCode = document.getElementById('reportModalOrgCode').value;
  const orgName = document.getElementById('reportModalOrgName').textContent;
  const selVal = document.getElementById('issueSelect').value;
  const issueLabel = selVal !== '' ? ISSUE_LABELS[parseInt(selVal)] : '';
  const issueNote = document.getElementById('issueNote').value.trim();
  const msgEl = document.getElementById('reportModalMsg');
  const btn = document.getElementById('reportModalBtn');

  msgEl.className = 'msg info';
  msgEl.textContent = '產生中，請稍候…';
  msgEl.style.display = 'block';
  btn.disabled = true;

  try {
    const data = await callAPI({
      type: 'adminGenerateReport',
      orgCode,
      issueLabel,
      issueNote
    });
    if (data.status === 'ok') {
      document.getElementById('reportModal').style.display = 'none';
      btn.disabled = false;
      alert(`報告已產生！\n\n通知信已寄到你的信箱。\n報告連結：\n${data.reportUrl}\n\n完成人數：${data.completed} 人`);
      loadReports();
      switchTab('reports');
    } else {
      btn.disabled = false;
      msgEl.className = 'msg err';
      msgEl.textContent = data.message || '發生錯誤，請再試一次。';
    }
  } catch(e) {
    btn.disabled = false;
    msgEl.className = 'msg err';
    msgEl.textContent = '網路錯誤，請再試一次。';
  }
}

// ════════════════════════════════
//  報告記錄
// ════════════════════════════════
async function loadReports() {
  const el = document.getElementById('reportsContent');
  el.innerHTML = '<div class="loading">載入中…</div>';
  try {
    const data = await callAPI({ type: 'adminGetReports' });
    if (data.status !== 'ok' || data.reports.length === 0) {
      el.innerHTML = '<div class="empty">還沒有報告記錄。</div>';
      return;
    }
    el.innerHTML = data.reports.map(r => `
      <div class="report-row">
        <div class="report-info">
          <div class="report-name">${r.orgName} <span style="font-size:.72rem;color:var(--hint);font-weight:400">${r.orgCode}</span></div>
          <div class="report-meta">${r.reportId} ・ ${r.generatedAt}</div>
          ${r.note ? `<div style="font-size:.78rem;color:var(--a);margin-top:3px">備註：${r.note}</div>` : ''}
        </div>
        <div class="report-actions">
          <a href="${r.reportUrl}" target="_blank" class="btn-sec" style="text-decoration:none;font-size:.78rem">開啟報告</a>
          <button class="btn-sec" style="font-size:.78rem" onclick="editNote('${r.reportId}','${(r.note||'').replace(/'/g,"\\'")}')">備註</button>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">載入失敗，請重新整理。</div>';
  }
}

async function editNote(reportId, currentNote) {
  const note = prompt('編輯這份報告的備註（供你自己參考用）：', currentNote);
  if (note === null) return;
  try {
    await callAPI({ type: 'adminUpdateReportNote', reportId, note });
    loadReports();
  } catch(e) {
    alert('更新失敗。');
  }
}

// ════════════════════════════════
//  工具
// ════════════════════════════════
function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

// 點擊 modal 背景關閉
document.getElementById('orgModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('reportModal').addEventListener('click', function(e) {
  if (e.target === this) document.getElementById('reportModal').style.display = 'none';
});

// 自動重新整理（60秒），Modal 開啟時暫停
let autoRefreshTimer = null;

function isModalOpen() {
  return document.getElementById('orgModal').style.display === 'flex' ||
         document.getElementById('reportModal').style.display === 'flex';
}

function startAutoRefresh() {
  autoRefreshTimer = setInterval(() => {
    if (!isModalOpen()) {
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        const tabText = activeTab.textContent;
        if (tabText.includes('企業列表')) loadOrgs();
        if (tabText.includes('報告記錄')) loadReports();
      }
    }
  }, 60000); // 60 秒
}

startAutoRefresh();
(function initIssueSelect() {
  const sel = document.getElementById('issueSelect');
  ISSUE_LABELS.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = label;
    sel.appendChild(opt);
  });
})();
</script>
